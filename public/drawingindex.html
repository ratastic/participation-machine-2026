<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/public/drawingstyle.css">
    <title>Draw To Life Drawing Screen</title>
</head>
<body>
    <div class="background1">
    <div class="background2">
    <div class="background3">
    <button id="eraser"class="button-tool"></button>
    <button id="brushSmall"class="button-tool"></button>
    <button id="brushMed"class="button-tool"></button>
    <button id="brushBig"class="button-tool"></button>
    <div id="toolbar">
            <button id="clear"class="button-main"></button>
            <!-- <label for="lineWidth">Line Width</label> -->
            <!-- <input id="lineWidth" name='lineWidth' type="number" value="5"><br> -->
            <button id="undo"class="button-main"></button>
            <button id="redo"class="button-main"></button>
            <div id="label-container">
                <label for="stroke" class="color-label"><img src="images/toolButtons/ColorPicker.svg" alt="HTML5 Icon" style="width:150px;height:150px;"></label>
                <input id="stroke" name='stroke' type="color">
            </div>
            <button id= "guideButton" onclick="openGuide()"></button>
            <div id="label-container">
                <label for="upload" class="imageUpload"><img src="images/toolButtons/UploadImageButton.svg" alt="HTML5 Icon" style="width:200px;height:150px;"></label>
                <input type="file" id="upload" accept="image/*">
            </div>
            <!-- <div id="myDIV">
                <img src="images/toolButtons/Guide.png" alt="HTML5 Icon" style="width:400px;height:500px; overflow:hidden;">
            </div> -->
             <button id="save"class="button-main"></button>
    </div>
    <div class="drawing-board">
        <canvas id="drawing-board">
        </canvas>
    </div>
</div>
<script src="/public/drawingindex.js"></script>
</body>
</html>
